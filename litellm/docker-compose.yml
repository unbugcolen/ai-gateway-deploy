services:
  litellm:
    # 启用数据库能力的 LiteLLM 镜像，用于团队、virtual key、预算和 UI 状态持久化。
    image: ${LITELLM_IMAGE:-ghcr.io/berriai/litellm-database:main-latest}
    container_name: ai-gateway-litellm

    # 宿主机重启或容器异常退出后自动拉起。
    restart: always

    # 运行时密钥和部署环境相关配置放在远端 .env。
    env_file:
      - .env
    ports:
      # 在固定 IP 服务器上暴露 LiteLLM API/UI。
      - "${PUBLIC_PORT:-4000}:4000"
    volumes:
      # 路由和模型策略保存在 git 中，并以只读方式挂载到容器。
      - ./config.yaml:/app/config.yaml:ro
    environment:
      # LiteLLM 管理/root 密钥和凭据加密盐值。
      # DATABASE_URL 等连接串直接由 env_file: .env 传入容器。
      LITELLM_MASTER_KEY: "${LITELLM_MASTER_KEY}"
      LITELLM_SALT_KEY: "${LITELLM_SALT_KEY}"

      # 供应商 key 启动时可为空；运维填充 .env 前，对应模型别名的请求会失败。
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      DEEPSEEK_API_KEY: "${DEEPSEEK_API_KEY:-}"
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY:-}"
    command:
      - "--config"
      - "/app/config.yaml"
      - "--port"
      - "4000"
