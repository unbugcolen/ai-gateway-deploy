# LiteLLM 团队网关基础配置。
#
# 运维说明：
# - 供应商 API key 从远端 .env 读取，不提交到这里。
# - model_name 是暴露给客户端使用的模型别名。
# - litellm_params.model 是真实上游模型标识。
# - Claude 别名建议以 "claude" 或 "anthropic" 开头，便于 Claude Code 网关模型发现。
# - 部署后可在 LiteLLM UI 中管理 virtual key、预算和团队。

model_list:
  # 面向 Claude Code 的模型别名。
  # 需要在远端 .env 配置 ANTHROPIC_API_KEY。
  - model_name: claude-sonnet-4-5
    litellm_params:
      model: anthropic/claude-sonnet-4-5-20250929
      api_key: os.environ/ANTHROPIC_API_KEY

  # 面向 Codex/Cursor/服务端 SDK 的 OpenAI-compatible 模型别名。
  # 需要在远端 .env 配置 OPENAI_API_KEY。
  - model_name: gpt-5-mini
    litellm_params:
      model: openai/gpt-5-mini
      api_key: os.environ/OPENAI_API_KEY

  # Gemini 模型别名，可作为第二供应商或 fallback 模型。
  # 需要在远端 .env 配置 GEMINI_API_KEY。
  - model_name: gemini-2.5-pro
    litellm_params:
      model: gemini/gemini-2.5-pro
      api_key: os.environ/GEMINI_API_KEY

  # DeepSeek 模型别名，适合较低成本的编码/聊天负载。
  # 需要在远端 .env 配置 DEEPSEEK_API_KEY。
  - model_name: deepseek-chat
    litellm_params:
      model: deepseek/deepseek-chat
      api_key: os.environ/DEEPSEEK_API_KEY

litellm_settings:
  # 丢弃上游不支持的请求参数，而不是让整个请求失败。
  # 当不同客户端发送供应商特定字段时，这个配置更稳。
  drop_params: true

  # 上游请求超时时间，单位秒。编码 agent 往往需要较长流式输出。
  request_timeout: 600

  # 管理员创建新 virtual key 时应用的默认参数。
  # 避免意外创建无限额度 key。
  default_key_generate_params:
    # 每个新 key 的默认月预算，按 LiteLLM 的成本统计口径计算。
    max_budget: 50

    # 每 30 天重置预算。
    budget_duration: 30d

    # key 默认 90 天后过期，需续期后继续使用。
    duration: 90d

  # 创建 key 时允许的上限。管理员通过 UI/API 也不能超过这些值。
  upperbound_key_generate_params:
    # 单个 key 允许的最大预算。
    max_budget: 500

    # 预算重置周期。
    budget_duration: 30d

    # key 最大有效期。
    duration: 180d

    # 每分钟请求数限制。
    rpm_limit: 120

    # 每分钟 token 数限制。
    tpm_limit: 200000

  # key 创建策略。
  key_generation_settings:
    # 只有团队管理员可以创建团队 key，并且必须填写 tags 用于成本归因。
    team_key_generation:
      allowed_team_member_roles: ["admin"]
      required_params: ["tags"]

    # 只有代理管理员可以创建个人 key。
    personal_key_generation:
      allowed_user_roles: ["proxy_admin"]

general_settings:
  # 管理 API/UI 的 root key，从远端 .env 读取。
  master_key: os.environ/LITELLM_MASTER_KEY

  # PostgreSQL 连接串，由 docker-compose.yml 组装。
  database_url: os.environ/DATABASE_URL

  # 将模型元数据持久化到数据库，确保 UI 修改在容器重启后不丢失。
  store_model_in_db: true
