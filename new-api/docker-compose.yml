services:
  new-api:
    # New API 应用镜像。
    image: ${NEW_API_IMAGE:-calciumion/new-api:latest}
    container_name: ai-gateway-new-api

    # 宿主机重启或容器异常退出后自动拉起。
    restart: always

    # 将应用日志写入 /app/logs，便于通过数据卷持久化。
    command: --log-dir /app/logs

    # 运行时密钥和部署环境相关配置放在远端 .env。
    env_file:
      - .env
    ports:
      # 在固定 IP 服务器上暴露 New API Web UI 和 API。
      - "${PUBLIC_PORT:-3000}:3000"
    volumes:
      # New API 本地数据与日志。主要业务数据仍以 PostgreSQL 为准。
      - new_api_data:/data
      - new_api_logs:/app/logs
    environment:
      # 运行时行为和团队默认策略。
      # SQL_DSN、REDIS_CONN_STRING 等连接串直接由 env_file: .env 传入容器。
      TZ: "${TZ:-Asia/Shanghai}"
      SESSION_SECRET: "${SESSION_SECRET}"
      CRYPTO_SECRET: "${CRYPTO_SECRET}"
      FRONTEND_BASE_URL: "${FRONTEND_BASE_URL:-}"
      ERROR_LOG_ENABLED: "${ERROR_LOG_ENABLED:-true}"
      BATCH_UPDATE_ENABLED: "${BATCH_UPDATE_ENABLED:-true}"
      MEMORY_CACHE_ENABLED: "${MEMORY_CACHE_ENABLED:-true}"
      GENERATE_DEFAULT_TOKEN: "${GENERATE_DEFAULT_TOKEN:-false}"
      GLOBAL_API_RATE_LIMIT_ENABLE: "${GLOBAL_API_RATE_LIMIT_ENABLE:-true}"
      GLOBAL_API_RATE_LIMIT: "${GLOBAL_API_RATE_LIMIT:-300}"
      GLOBAL_API_RATE_LIMIT_DURATION: "${GLOBAL_API_RATE_LIMIT_DURATION:-180}"
      STREAMING_TIMEOUT: "${STREAMING_TIMEOUT:-300}"
      CHANNEL_UPSTREAM_MODEL_UPDATE_TASK_ENABLED: "${CHANNEL_UPSTREAM_MODEL_UPDATE_TASK_ENABLED:-true}"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  # Docker 管理的数据卷，仅保存 New API 本地文件与日志。
  new_api_data:
  new_api_logs:
