services:
  new-api:
    # New API 应用镜像。
    image: ${NEW_API_IMAGE:-calciumion/new-api:latest}
    container_name: ai-gateway-new-api

    # 宿主机重启或容器异常退出后自动拉起。
    restart: always

    # 将应用日志写入 /app/logs，便于通过数据卷持久化。
    command: --log-dir /app/logs

    # 运行时密钥和部署环境相关配置放在远端 .env。
    env_file:
      - .env
    ports:
      # 在固定 IP 服务器上暴露 New API Web UI 和 API。
      - "${PUBLIC_PORT:-3000}:3000"
    volumes:
      # New API 本地数据与日志。主要业务数据仍以 PostgreSQL 为准。
      - new_api_data:/data
      - new_api_logs:/app/logs
    environment:
      # 内部 PostgreSQL 连接串，连接下方 postgres 服务。
      SQL_DSN: "postgresql://${POSTGRES_USER:-newapi}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-newapi}"

      # 内部 Redis 连接，用于缓存/队列能力。
      REDIS_CONN_STRING: "redis://redis:6379"

      # 运行时行为和团队默认策略。
      TZ: "${TZ:-Asia/Shanghai}"
      SESSION_SECRET: "${SESSION_SECRET}"
      CRYPTO_SECRET: "${CRYPTO_SECRET}"
      FRONTEND_BASE_URL: "${FRONTEND_BASE_URL:-}"
      ERROR_LOG_ENABLED: "${ERROR_LOG_ENABLED:-true}"
      BATCH_UPDATE_ENABLED: "${BATCH_UPDATE_ENABLED:-true}"
      MEMORY_CACHE_ENABLED: "${MEMORY_CACHE_ENABLED:-true}"
      GENERATE_DEFAULT_TOKEN: "${GENERATE_DEFAULT_TOKEN:-false}"
      GLOBAL_API_RATE_LIMIT_ENABLE: "${GLOBAL_API_RATE_LIMIT_ENABLE:-true}"
      GLOBAL_API_RATE_LIMIT: "${GLOBAL_API_RATE_LIMIT:-300}"
      GLOBAL_API_RATE_LIMIT_DURATION: "${GLOBAL_API_RATE_LIMIT_DURATION:-180}"
      STREAMING_TIMEOUT: "${STREAMING_TIMEOUT:-300}"
      CHANNEL_UPSTREAM_MODEL_UPDATE_TASK_ENABLED: "${CHANNEL_UPSTREAM_MODEL_UPDATE_TASK_ENABLED:-true}"
    depends_on:
      postgres:
        # 等待 PostgreSQL 就绪后再启动 New API。
        condition: service_healthy
      redis:
        # 等待 Redis 就绪后再启动 New API。
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  postgres:
    # 持久化 New API 用户、token、渠道、额度和日志的数据库。
    image: postgres:15-alpine
    container_name: ai-gateway-postgres
    restart: always
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-newapi}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB:-newapi}"
    volumes:
      # 使用 Docker named volume，容器升级后数据仍保留。
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-newapi} -d ${POSTGRES_DB:-newapi}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    # New API 使用的 Redis 缓存/队列后端。
    image: redis:7-alpine
    container_name: ai-gateway-redis
    restart: always
    # 开启 AOF 持久化，降低重启导致的数据丢失风险。
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  # Docker 管理的数据卷。执行破坏性维护前先备份 postgres_data。
  new_api_data:
  new_api_logs:
  postgres_data:
  redis_data:
