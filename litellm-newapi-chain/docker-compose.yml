name: ${COMPOSE_PROJECT_NAME:-ai-gateway-chain}

services:
  new-api:
    # New API 只作为下游渠道池和供应商 key 管理后台。
    # 员工请求不直接打到这里，而是统一打到 LiteLLM。
    image: ${NEW_API_IMAGE:-calciumion/new-api:latest}
    container_name: ${NEW_API_CONTAINER_NAME:-ai-gateway-chain-new-api}
    restart: always
    command: --log-dir /app/logs
    env_file:
      - .env
    ports:
      # 默认只绑定本机，避免员工绕过 LiteLLM 直接访问 New API。
      - "${NEW_API_ADMIN_BIND:-127.0.0.1}:${NEW_API_ADMIN_PORT:-3000}:3000"
    volumes:
      - new_api_data:/data
      - new_api_logs:/app/logs
    environment:
      # SQL_DSN、REDIS_CONN_STRING、代理变量等直接由 env_file: .env 传入容器。
      TZ: "${TZ:-Asia/Shanghai}"
      SESSION_SECRET: "${SESSION_SECRET}"
      CRYPTO_SECRET: "${CRYPTO_SECRET}"
      FRONTEND_BASE_URL: "${FRONTEND_BASE_URL:-}"
      GENERATE_DEFAULT_TOKEN: "${GENERATE_DEFAULT_TOKEN:-false}"
      ERROR_LOG_ENABLED: "${ERROR_LOG_ENABLED:-true}"
      BATCH_UPDATE_ENABLED: "${BATCH_UPDATE_ENABLED:-true}"
      MEMORY_CACHE_ENABLED: "${MEMORY_CACHE_ENABLED:-true}"
      STREAMING_TIMEOUT: "${STREAMING_TIMEOUT:-300}"
      GLOBAL_API_RATE_LIMIT_ENABLE: "${GLOBAL_API_RATE_LIMIT_ENABLE:-true}"
      GLOBAL_API_RATE_LIMIT: "${GLOBAL_API_RATE_LIMIT:-300}"
      GLOBAL_API_RATE_LIMIT_DURATION: "${GLOBAL_API_RATE_LIMIT_DURATION:-180}"
      CHANNEL_UPSTREAM_MODEL_UPDATE_TASK_ENABLED: "${CHANNEL_UPSTREAM_MODEL_UPDATE_TASK_ENABLED:-true}"
    extra_hosts:
      # 兼容 Linux Docker 访问宿主机 PostgreSQL、Redis 或代理。
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  litellm:
    # LiteLLM 是唯一对员工、Claude Code、Codex、Cursor 和服务端应用暴露的入口。
    image: ${LITELLM_IMAGE:-ghcr.io/berriai/litellm-database:main-latest}
    container_name: ${LITELLM_CONTAINER_NAME:-ai-gateway-chain-litellm}
    restart: always
    env_file:
      - .env
    depends_on:
      new-api:
        condition: service_healthy
    ports:
      - "${LITELLM_PUBLIC_BIND:-0.0.0.0}:${LITELLM_PUBLIC_PORT:-4000}:4000"
    volumes:
      - ./litellm-config.yaml:/app/config.yaml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - "--config"
      - "/app/config.yaml"
      - "--port"
      - "4000"

volumes:
  # 仅保存 New API 本地文件和日志；业务数据仍以外部 PostgreSQL 为准。
  new_api_data:
  new_api_logs:
