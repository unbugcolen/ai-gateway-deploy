name: 部署 AI Gateway

on:
  workflow_dispatch:
    inputs:
      gateway:
        description: 要部署的网关方案
        required: true
        default: litellm
        type: choice
        options:
          - litellm
          - new-api
      host:
        description: 目标服务器 IP/域名。留空则使用仓库变量 AI_GATEWAY_HOST。
        required: false
        type: string
      ssh_user:
        description: 目标服务器 SSH 用户。
        required: true
        default: root
        type: string
      ssh_port:
        description: 目标服务器 SSH 端口。
        required: true
        default: "22"
        type: string
      remote_path:
        description: 远端安装路径。留空则使用项目默认路径。
        required: false
        type: string
      public_port:
        description: 对外服务端口。留空则使用网关默认端口。
        required: false
        type: string
      frontend_url:
        description: New API 对外访问地址。仅 new-api 使用；留空则按 host/port 自动生成。
        required: false
        type: string
      with_bundled_deps:
        description: 是否同时部署随附数据库/缓存。仅本地或测试环境使用，生产建议保持 false。
        required: true
        default: false
        type: boolean
      environment:
        description: GitHub Environment 名称，用于审批和环境级密钥。
        required: true
        default: production
        type: string

permissions:
  contents: read

jobs:
  deploy:
    name: 部署 ${{ inputs.gateway }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 runner 依赖
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y rsync openssh-client

      - name: 配置 SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.AI_GATEWAY_SSH_PRIVATE_KEY }}
          INPUT_HOST: ${{ inputs.host }}
          VAR_HOST: ${{ vars.AI_GATEWAY_HOST }}
          SSH_USER: ${{ inputs.ssh_user }}
          SSH_PORT: ${{ inputs.ssh_port }}
        run: |
          set -euo pipefail

          host="${INPUT_HOST:-$VAR_HOST}"
          if [[ -z "$host" ]]; then
            echo "::error::缺少目标服务器地址。请填写 workflow 输入 host，或配置仓库变量 AI_GATEWAY_HOST。"
            exit 1
          fi

          if [[ -z "$SSH_PRIVATE_KEY" ]]; then
            echo "::error::缺少 Secret AI_GATEWAY_SSH_PRIVATE_KEY。"
            exit 1
          fi

          install -m 700 -d ~/.ssh
          key_file="$HOME/.ssh/ai_gateway_deploy_key"
          printf '%s\n' "$SSH_PRIVATE_KEY" >"$key_file"
          chmod 600 "$key_file"

          cat >~/.ssh/config <<EOF
          Host ai-gateway-target
            HostName ${host}
            User ${SSH_USER}
            Port ${SSH_PORT}
            IdentityFile ${key_file}
            IdentitiesOnly yes
            StrictHostKeyChecking accept-new
          EOF

          ssh -F ~/.ssh/config -o BatchMode=yes ai-gateway-target 'echo "SSH 连接正常"'

      - name: 部署所选网关
        env:
          GATEWAY: ${{ inputs.gateway }}
          SSH_USER: ${{ inputs.ssh_user }}
          SSH_PORT: ${{ inputs.ssh_port }}
          INPUT_REMOTE_PATH: ${{ inputs.remote_path }}
          INPUT_PUBLIC_PORT: ${{ inputs.public_port }}
          INPUT_FRONTEND_URL: ${{ inputs.frontend_url }}
          WITH_BUNDLED_DEPS: ${{ inputs.with_bundled_deps }}
        run: |
          set -euo pipefail

          case "$GATEWAY" in
            litellm)
              script="./scripts/deploy-litellm.sh"
              default_remote_path="/opt/ai-gateway/litellm"
              default_public_port="4000"
              ;;
            new-api)
              script="./scripts/deploy-new-api.sh"
              default_remote_path="/opt/ai-gateway/new-api"
              default_public_port="3000"
              ;;
            *)
              echo "::error::不支持的网关方案: $GATEWAY"
              exit 1
              ;;
          esac

          remote_path="${INPUT_REMOTE_PATH:-$default_remote_path}"
          public_port="${INPUT_PUBLIC_PORT:-$default_public_port}"

          args=(
            "--host" "ai-gateway-target"
            "--user" "$SSH_USER"
            "--ssh-port" "$SSH_PORT"
            "--path" "$remote_path"
            "--public-port" "$public_port"
          )

          if [[ "$GATEWAY" == "new-api" && -n "$INPUT_FRONTEND_URL" ]]; then
            args+=("--frontend-url" "$INPUT_FRONTEND_URL")
          fi

          if [[ "$WITH_BUNDLED_DEPS" == "true" ]]; then
            args+=("--with-bundled-deps")
          fi

          "$script" "${args[@]}"
